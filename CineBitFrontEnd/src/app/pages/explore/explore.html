<ui-page>
  <div header class="px-6 md:px-10 pb-2">
    <p class="text-[#D9D9D9] text-sm">Cosa vuoi guardare oggi?</p>
  </div>

  <div main class="flex flex-col gap-8">
    <searchbar [(query)]="query" (searchEvent)="onSearch()"></searchbar>

    @if (loading) {
      <p class="text-white/60 text-center">Caricamento...</p>
    }

    @if (error) {
      <p class="text-red-400 text-center">{{ error }}</p>
    }

    <section class="flex items-center justify-between">
  <h2 class="text-lg md:text-xl font-semibold">Titoli del momento</h2>

  <!-- frecce (desktop) -->
  <div class="hidden md:flex gap-2">
    <button
      class="h-10 w-10 rounded-full border border-white/15 bg-white/5 hover:bg-white/10"
      (click)="scrollRow(-1)"
      aria-label="Scroll left"
    >
      ‹
    </button>
    <button
      class="h-10 w-10 rounded-full border border-white/15 bg-white/5 hover:bg-white/10"
      (click)="scrollRow(1)"
      aria-label="Scroll right"
    >
      ›
    </button>
  </div>
</section>

<section
  #row
  class="flex gap-4 overflow-x-auto pb-2
         snap-x snap-mandatory scroll-smooth
         [-ms-overflow-style:none] [scrollbar-width:none]
         [&::-webkit-scrollbar]:hidden"
>
  @for (film of movies; track film.id) {
    <div class="snap-start shrink-0 w-[160px] sm:w-[190px] md:w-[220px]">
      <card-film [film]="film" (cliccata)="onCardClick($event)"></card-film>
    </div>
  }
</section>
  </div>

  <div footer></div>
</ui-page>
