<section class="w-full">
  <div class="max-w-[900px] mx-auto">
    <div class="relative w-full h-16 md:h-20 rounded-[22px]
                bg-white/5 border border-white/15
                shadow-[0_20px_60px_rgba(0,0,0,0.6)]
                focus-within:border-[#55BBEF]">
      <img
        src="assets/cinebit-logo.png"
        alt="CineBit"
        class="absolute left-4 top-1/2 -translate-y-1/2 h-10 w-10 object-contain"
      />
      <input
        class="w-full h-full bg-transparent pl-16 pr-5
               text-white text-base md:text-lg
               placeholder:text-white/35
               focus:outline-none"
        placeholder="Cerca film, genere, attore..."
        [value]="query"
        (input)="onInputChange($any($event.target).value)"
        (keyup.enter)="onSearch()"
        name="query"
      />
    </div>
    <p class="mt-3 text-white/45 text-sm">
      Suggerimento: prova "mostrami un film anni..." "film romantici" "film simile a..."
    </p>
  </div>
</section>
